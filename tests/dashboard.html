<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System | Test Suite Audit Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #161c2d;
            --primary: #6366f1;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 40px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0b0f19 70%);
        }

        header {
            max-width: 1000px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .title-group h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-group p { color: var(--text-dim); margin-top: 4px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 40px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-4px); }

        .stat-card.pass { border-bottom: 4px solid var(--success); }
        .stat-card.fail { border-bottom: 4px solid var(--error); }

        .stat-label { color: var(--text-dim); font-size: 0.875rem; font-weight: 500; margin-bottom: 8px; }
        .stat-value { font-size: 2rem; font-weight: 800; font-family: 'Outfit'; }

        .progress-container {
            max-width: 1000px;
            margin: 0 auto 40px;
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 100px;
            overflow: hidden;
            display: flex;
        }

        .progress-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .fill-pass { background: var(--success); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .fill-fail { background: var(--error); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        .test-list {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            gap: 12px;
        }

        .test-item {
            background: var(--surface);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .test-info { display: flex; align-items: center; gap: 16px; }
        .test-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .badge-pass { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-fail { background: rgba(239, 68, 68, 0.2); color: var(--error); }

        .test-name { font-weight: 600; font-size: 1.1rem; }
        .test-desc { color: var(--text-dim); font-size: 0.9rem; margin-top: 2px; }

        .time-badge {
            padding: 4px 10px;
            background: var(--glass);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>
    <header>
        <div class="title-group">
            <p>System Integrity Audit</p>
            <h1>Movie Recommendation System Test Center</h1>
        </div>
        <div id="timestamp" style="color: var(--text-dim); font-size: 0.8rem;"></div>
    </header>

    <div class="stats-grid" id="stats-grid">
        <!-- Stats populated by JS -->
    </div>

    <div class="progress-container">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
            <span style="font-weight: 600; font-size: 0.9rem;">Overall System Stability</span>
            <span id="score-text" style="font-weight: 800; font-family: 'Outfit';">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progress-pass" class="progress-fill fill-pass" style="width: 0%"></div>
            <div id="progress-fail" class="progress-fill fill-fail" style="width: 0%"></div>
        </div>
    </div>

    <div class="test-list" id="test-list">
        <div class="empty-state">Waiting for test results... Run runner.py to generate test_results.json</div>
    </div>

    <script>
        async function loadResults() {
            try {
                const response = await fetch('test_results.json');
                const data = await response.json();
                
                document.getElementById('timestamp').innerText = `Last Generated: ${data.timestamp}`;
                
                // Stats
                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Total Tests</div>
                        <div class="stat-value">${data.total}</div>
                    </div>
                    <div class="stat-card pass">
                        <div class="stat-label">Passed</div>
                        <div class="stat-value" style="color: var(--success)">${data.passed}</div>
                    </div>
                    <div class="stat-card fail">
                        <div class="stat-label">Failed/Error</div>
                        <div class="stat-value" style="color: var(--error)">${data.failed + data.errors}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Duration</div>
                        <div class="stat-value">${data.duration}s</div>
                    </div>
                `;

                // Progress
                const passRate = (data.passed / data.total) * 100;
                const failRate = ((data.failed + data.errors) / data.total) * 100;
                
                setTimeout(() => {
                    document.getElementById('progress-pass').style.width = `${passRate}%`;
                    document.getElementById('progress-fail').style.width = `${failRate}%`;
                    document.getElementById('score-text').innerText = `${Math.round(passRate)}%`;
                }, 100);

                // List
                const testList = document.getElementById('test-list');
                testList.innerHTML = '';
                
                data.tests.forEach((test, index) => {
                    const item = document.createElement('div');
                    item.className = 'test-item';
                    item.style.animationDelay = `${index * 0.1}s`;
                    
                    const isPass = test.status === 'pass';
                    const icon = isPass ? '✓' : '✗';
                    const badgeClass = isPass ? 'badge-pass' : 'badge-fail';
                    
                    item.innerHTML = `
                        <div class="test-info">
                            <div class="test-badge ${badgeClass}">${icon}</div>
                            <div>
                                <div class="test-name">${test.name.replace(/_/g, ' ')}</div>
                                <div class="test-desc">${test.doc || 'No description provided.'}</div>
                            </div>
                        </div>
                        <div class="time-badge">passed</div>
                    `;
                    testList.appendChild(item);
                });

            } catch (err) {
                console.error("Error loading results:", err);
            }
        }

        loadResults();
        // Refresh every 5 seconds if someone is watching
        setInterval(loadResults, 5000);
    </script>
</body>
</html>
